services:
  tailscale-key-monitor:
    build: .
    # Or, if you push the image to a registry:
    # image: yourregistry/tailscale-key-monitor:latest
    container_name: tailscale-key-monitor
    restart: unless-stopped
    environment:
      TS_OAUTH_CLIENT_ID: ${TS_OAUTH_CLIENT_ID}
      TS_OAUTH_CLIENT_SECRET: ${TS_OAUTH_CLIENT_SECRET}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      # Optional overrides (defaults shown):
      # TAILNET: "-"
      # WARN_DAYS: "7"
      # CRIT_DAYS: "1"
      # CHECK_INTERVAL_HOURS: "6"
      # SEND_RECOVERY: "true"
      # DISCORD_MENTION: "<@123456789012345678>"   # ping on CRITICAL/EXPIRED
    volumes:
      - ./data:/data
    # Hard caps — this thing genuinely doesn't need more.
    mem_limit: 64m
    memswap_limit: 64m
    cpus: 0.10
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
